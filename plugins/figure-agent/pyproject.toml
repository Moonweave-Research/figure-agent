[project]
name = "figure-agent"
version = "0.1.9"
description = "Claude Code plugin: schematic prompt intent control + vector compile."
requires-python = ">=3.12"
dependencies = [
    "numpy>=2.4.4",
    "pillow>=12.2.0",
    "pyyaml>=6.0.3",
    "scipy>=1.12.0",
]

[tool.ruff]
line-length = 100
target-version = "py312"

[tool.ruff.lint]
select = ["E", "F", "I", "UP"]

[tool.pytest.ini_options]
testpaths = ["tests"]

[tool.setuptools]
packages = []
py-modules = []

[dependency-groups]
dev = [
    "pytest>=9.0.3",
]
