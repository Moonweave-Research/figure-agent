# Known false-positive patterns for check_visual_clash.py.
# Used with --ignore-known-fp flag. Default mode always reports all.
#
# Each entry needs at minimum: id + fixture + (glyph or glyph_pattern).
# Optional: kind, dark_min, dark_max, edge_max, bbox_height_max.
#
# fixture SCOPE (required): a suppression is only valid on the figure it was
# validated on. `fixture` is a fixture name (or a list of names) matched
# against check_visual_clash._fixture_name(pdf). An entry WITHOUT a fixture
# suppresses NOTHING — a global suppression would silence real clashes that
# merely share a glyph ("PDMS", "Sulfur", "+", "−", "HOMO") on another figure.
#
# fig3_trapping_concept: light-gray panel backgrounds trigger luma_std >= 25
# for all header/label text; charge symbols on colored fills trigger text_on_path.

patterns:
  # Fig3 resistance mechanism: these glyphs intentionally sit beside their
  # declared arrows, axes, peaks, or trap paths. Keep the material-name words
  # unsuppressed because their current contact with the film boundary is real.
  - id: fig3_resistance_applied_v_near_arrow
    fixture: fig3_resistance_mechanism
    glyph: V
    kind: near_miss
    dark_max: 0.03
    edge_max: 0.01

  - id: fig3_resistance_voltage_symbol_near_arrow
    fixture: fig3_resistance_mechanism
    glyph: V
    kind: text_on_path
    dark_max: 0.04
    edge_max: 0.01

  - id: fig3_resistance_panel_b_near_frame
    fixture: fig3_resistance_mechanism
    glyph: B
    kind: near_miss
    dark_max: 0.03
    edge_max: 0.01

  - id: fig3_resistance_trap_glyph_on_walk
    fixture: fig3_resistance_mechanism
    glyph: "×"
    kind: text_on_path
    dark_max: 0.13
    edge_max: 0.02

  - id: fig3_resistance_s60_peak_label
    fixture: fig3_resistance_mechanism
    glyph: S60
    kind: near_miss
    dark_max: 0.03
    edge_max: 0.01

  - id: fig3_resistance_current_axis_label
    fixture: fig3_resistance_mechanism
    glyph: I(t)
    kind: near_miss
    dark_max: 0.025
    edge_max: 0.012

  # Header reflow changes the PDF crop phase but not these declared label/path
  # relations. At the bounded low signal below, the S60 and I(t) text-on-path
  # candidates are raster self-edge residue; stronger signals remain actionable.
  - id: fig3_resistance_s60_peak_label_raster_self_edge
    fixture: fig3_resistance_mechanism
    glyph: S60
    kind: text_on_path
    dark_max: 0.04
    edge_max: 0.012

  - id: fig3_resistance_current_equation_raster_self_edge
    fixture: fig3_resistance_mechanism
    glyph: I(t)
    kind: text_on_path
    dark_max: 0.04
    edge_max: 0.012

  - id: fig3_resistance_magnitude_label_near_measure
    fixture: fig3_resistance_mechanism
    glyph: "ρ"
    kind: near_miss
    dark_max: 0.02
    edge_max: 0.01

  # The g(E) ordinate label is deliberately offset from, but still owned by,
  # the y-axis. Restrict this suppression to the measured low-signal residue.
  - id: fig3_resistance_dos_axis_label_near_arrow
    fixture: fig3_resistance_mechanism
    glyph: "g(E)"
    kind: near_miss
    dark_max: 0.02
    edge_max: 0.01

  - id: fig3_resistance_applied_plus_voltage_near_axis
    fixture: fig3_resistance_mechanism
    glyph: "+V"
    kind: text_on_path
    dark_max: 0.12
    edge_max: 0.015

  - id: fig3_resistance_s80_curve_label_near_miss
    fixture: fig3_resistance_mechanism
    glyph: S80
    kind: near_miss
    dark_max: 0.02
    edge_max: 0.01

  - id: fig3_resistance_broad_curve_label_near_path
    fixture: fig3_resistance_mechanism
    glyph: broad
    kind: text_on_path
    dark_max: 0.06
    edge_max: 0.01

  - id: fig3_resistance_rho_subscript_self_signal
    fixture: fig3_resistance_mechanism
    glyph: "60"
    kind: text_on_path
    dark_max: 0.09
    edge_max: 0.02

  # A white knockout now interrupts the film boundary behind this label.
  # These low residual signals pass; the unrepaired dark≈0.20 contacts do not.
  - id: fig3_resistance_material_label_knockout_left
    fixture: fig3_resistance_mechanism
    glyph: disordered
    kind: text_on_path
    dark_max: 0.04
    edge_max: 0.01

  - id: fig3_resistance_material_label_knockout_right
    fixture: fig3_resistance_mechanism
    glyph: film
    kind: near_miss
    dark_max: 0.025
    edge_max: 0.01

  # Panel header labels — light gray background, not a fill clash
  - id: panel_label_a
    fixture: fig3_trapping_concept
    glyph: "(a)"
    kind: text_on_fill

  - id: panel_label_b
    fixture: fig3_trapping_concept
    glyph: "(b)"
    kind: text_on_fill

  - id: material_label_pdms
    fixture: fig3_trapping_concept
    glyph: PDMS
    kind: text_on_fill

  - id: material_label_pdms_path_edge
    fixture: fig3_trapping_concept
    glyph: PDMS
    kind: text_on_path
    dark_max: 0.06
    edge_max: 0.01

  - id: material_label_sulfur
    fixture: fig3_trapping_concept
    glyph: Sulfur
    kind: text_on_fill

  # Schematic domain labels on light-gray panel background
  - id: schematic_label_injection
    fixture: fig3_trapping_concept
    glyph: injection
    kind: text_on_fill

  - id: schematic_label_homo
    fixture: fig3_trapping_concept
    glyph_pattern: "HOMO"
    kind: text_on_fill

  - id: caption_label_fast
    fixture: fig3_trapping_concept
    glyph: fast
    kind: text_on_fill

  # Charge symbols on colored fill (known pattern from prior dogfooding)
  - id: charge_symbol_minus
    fixture: fig3_trapping_concept
    glyph: "−"
    kind: text_on_path
    dark_max: 0.35
    edge_max: 0.05

  - id: charge_symbol_plus
    fixture: fig3_trapping_concept
    glyph: "+"
    kind: text_on_path
    dark_max: 0.35
    edge_max: 0.05

  # Energy axis label on schematic path
  - id: energy_axis_label_e
    fixture: fig3_trapping_concept
    glyph: E
    kind: text_on_path
    dark_max: 0.15
    edge_max: 0.02

  # Golden trap-depth fixture: band labels intentionally sit inside light
  # gray semiconductor boxes. These are not text/path clashes when the
  # dark/edge signal stays in the compact label-box range.
  - id: trap_depth_band_label_cb
    fixture: golden_trap_depth_picture
    glyph: CB
    kind: text_on_path
    dark_max: 0.06
    edge_max: 0.02

  - id: trap_depth_band_label_vb
    fixture: golden_trap_depth_picture
    glyph: VB
    kind: near_miss
    dark_max: 0.05
    edge_max: 0.02

  # Caption subscript V(t)
  - id: caption_subscript_v
    fixture: fig3_trapping_concept
    glyph: V
    kind: text_on_path
    dark_max: 0.05
    edge_max: 0.01

  - id: caption_subscript_t
    fixture: fig3_trapping_concept
    glyph: "(t)"
    kind: text_on_path
    dark_max: 0.05
    edge_max: 0.01

  # fig1_updated_agent_redraw_v1 (R5.2e / C5): orchestrator crop review under the
  # named human's delegation confirmed these six blocking text_on_path candidates
  # carry no real collision. The bold panel titles / panel letters sit beside the
  # thin (0.32pt) panel-frame line and only their own-glyph antialiased halo grazes
  # it; the Vs meter label is adequately separated from its own meter box border.
  # Bounds are tight (just above each measured signal) and glyph-scoped, so the
  # four real repaired defects (constant / voltage / probe / cantilever, dark
  # 0.11-0.21) and any future stronger collision on these glyphs stay actionable.
  - id: fig1_panelA_title_polymer_name_frame_halo
    fixture: fig1_updated_agent_redraw_v1
    glyph: poly(S-r-DIB)
    kind: text_on_path
    dark_max: 0.05
    edge_max: 0.012
    ground: "Panel A title tail 'poly(S-r-DIB)'; own-glyph halo grazes the thin top frame line, no real path collision (orchestrator crop review)."
  - id: fig1_panelC_hero_tag_frame_halo
    fixture: fig1_updated_agent_redraw_v1
    glyph: HERO
    kind: text_on_path
    dark_max: 0.06
    edge_max: 0.015
    ground: "Panel C corner 'HERO' tag; bold-glyph halo near the thin frame line, no real collision (orchestrator crop review)."
  - id: fig1_panelE_letter_e_frame_halo
    fixture: fig1_updated_agent_redraw_v1
    glyph: E
    kind: text_on_path
    dark_max: 0.05
    edge_max: 0.012
    ground: "Panel E bold panel-letter 'E'; own-glyph halo near the thin frame line, not a real path crossing (orchestrator crop review)."
  - id: fig1_panelF_letter_f_frame_halo
    fixture: fig1_updated_agent_redraw_v1
    glyph: F
    kind: text_on_path
    dark_max: 0.05
    edge_max: 0.012
    ground: "Panel F bold panel-letter 'F'; own-glyph halo near the thin frame line, not a real path crossing (orchestrator crop review)."
  - id: fig1_panelE_title_ispd_frame_halo
    fixture: fig1_updated_agent_redraw_v1
    glyph: ISPD
    kind: text_on_path
    dark_max: 0.06
    edge_max: 0.018
    ground: "Panel E title head 'ISPD'; bold-title glyph halo near the thin frame line, no real collision (orchestrator crop review)."
  - id: fig1_panelE_vs_meter_label_box_border
    fixture: fig1_updated_agent_redraw_v1
    glyph: Vs
    kind: text_on_path
    dark_max: 0.18
    edge_max: 0.035
    ground: "Panel E 'Vs' meter label; adequately separated from its own Vs-meter box border (orchestrator crop review) — box-border proximity, not a real overlap."
