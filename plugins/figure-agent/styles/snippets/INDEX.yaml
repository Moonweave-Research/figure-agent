# L3 Snippet Library — Machine-Readable Index
#
# schema_version: 0.1 (2026-05-05, draft)
# Purpose: matchable projection of styles/snippets/README.md for
#          briefing→snippet selection, L2.5 reference-hint matching,
#          and acceptance-gate verification.
# Source-of-truth narrative remains the per-snippet section in README.md;
# narrative changes there must update the matchable fields here in the
# same commit.
#
# Schema (per snippet entry):
#   file:          string  — path relative to plugin root
#   status:        enum    — planned | vendored | integrated_wip | shipped | deferred
#   track:         string  — A1..A4 (macro) | V1..V6 (vendor) | null
#
#   domain:                — what scientific subject is depicted
#     primary:     enum    — polymer | band-structure | device-stack |
#                            process-flow | actuation | plotting | molecule
#     tags:        list    — free-form refinement keywords
#
#   role:                  — composition role inside a paper figure
#     level:       enum    — primitive | composite | panel
#     placement:   enum    — row-element | column | panel | inset | full-figure
#     depicts:     string  — short noun-phrase description
#
#   axes:                  — quantitative axis behavior
#     type:        enum    — symbolic | linear | semilog | loglog | none
#     data_grounded: bool  — true if numeric data drives geometry
#
#   api:
#     kind:        enum    — macro | style-key | raw-tikz
#     signature:   string  — macro signature, style key, or "(none)"
#     tunable:     list    — args / providecommand tokens callers override
#
#   preconditions:
#     preamble:    string  — required .sty file
#     palette_tokens: list — palette colors used
#     requires_macros: list — preamble primitives the snippet calls
#     compile_engine: enum — lualatex | pdflatex | xelatex | any
#
#   known_pitfalls: list   — short bullets (≤1 line each, monotonic — never delete)
#   smoke_fixture: string  — standalone smoke fixture path
#   consumed_by:   list    — production consumer fixtures (or empty)
#
#   discoverability:       — matcher (briefing→snippet) hits before reading API
#     keywords:    list    — natural-language keywords
#     reference_hints:     — what L2.5 reference_extract should yield
#       palette_clusters: list   — matches palette.py output keys
#       ocr_terms:        list   — matches ocr.py text_labels
# ============================================================

