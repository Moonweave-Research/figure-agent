# L3 Snippet Library вҖ” Machine-Readable Index
#
# schema_version: 0.1 (2026-05-05, draft)
# Purpose: matchable projection of styles/snippets/README.md for
#          briefingвҶ’snippet selection, L2.5 reference-hint matching,
#          and acceptance-gate verification.
# Source-of-truth narrative remains the per-snippet section in README.md;
# narrative changes there must update the matchable fields here in the
# same commit.
#
# Schema (per snippet entry):
#   file:          string  вҖ” path relative to plugin root
#   status:        enum    вҖ” planned | vendored | integrated_wip | shipped | deferred
#   track:         string  вҖ” A1..A4 (macro) | V1..V6 (vendor) | null
#
#   domain:                вҖ” what scientific subject is depicted
#     primary:     enum    вҖ” polymer | band-structure | device-stack |
#                            process-flow | actuation | plotting | molecule
#     tags:        list    вҖ” free-form refinement keywords
#
#   role:                  вҖ” composition role inside a paper figure
#     level:       enum    вҖ” primitive | composite | panel
#     placement:   enum    вҖ” row-element | column | panel | inset | full-figure
#     depicts:     string  вҖ” short noun-phrase description
#
#   axes:                  вҖ” quantitative axis behavior
#     type:        enum    вҖ” symbolic | linear | semilog | loglog | none
#     data_grounded: bool  вҖ” true if numeric data drives geometry
#
#   api:
#     kind:        enum    вҖ” macro | style-key | raw-tikz
#     signature:   string  вҖ” macro signature, style key, or "(none)"
#     tunable:     list    вҖ” args / providecommand tokens callers override
#
#   preconditions:
#     preamble:    string  вҖ” required .sty file
#     palette_tokens: list вҖ” palette colors used
#     requires_macros: list вҖ” preamble primitives the snippet calls
#     compile_engine: enum вҖ” lualatex | pdflatex | xelatex | any
#
#   known_pitfalls: list   вҖ” short bullets (вүӨ1 line each, monotonic вҖ” never delete)
#   briefing_hooks: list   вҖ” real В§7 phrases mined from existing briefings;
#                            empty list when no precedent (fabrication discouraged)
#   anti_patterns:  list   вҖ” situations where this snippet should NOT be used
#                            despite keyword match (prevents false-positive matches)
#   smoke_fixture: string  вҖ” standalone smoke fixture path
#   consumed_by:   list    вҖ” production consumer fixtures (or empty)
#
#   discoverability:       вҖ” matcher (briefingвҶ’snippet) hits before reading API
#     keywords:    list    вҖ” natural-language keywords
#     reference_hints:     вҖ” what L2.5 reference_extract should yield
#       palette_clusters: list   вҖ” matches palette.py output keys
#       ocr_terms:        list   вҖ” matches ocr.py text_labels
# ============================================================

schema_version: 0.2
generated: 2026-05-05
