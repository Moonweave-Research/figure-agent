    separator_lines:
      pattern: '\\draw\[sep\]'
      min: 2
    band_boxes:
      pattern: '\\BandBox\b'
      min: 2
    distribution_lobes:
      pattern: '\\SmallLobe\b'
      min: 2
    plot_callouts:
