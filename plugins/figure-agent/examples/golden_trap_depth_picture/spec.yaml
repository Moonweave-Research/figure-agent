    - "Mathematical interpretation"
    - "Molecular origin"
    - "I t"
    - "slope"
    - "Discharge"
    - "Debye"
    - "tau d"
    - "n"
    - ["g e t", "g et"]
    - "shallow"
    - "deep"
    - "localized traps"
    - "S rich segments"
    - "chemical origin"
    - "physical origin"
    - "converged trap depth picture"
    - "Energy"
    - "CB"
    - "VB"
    - ["e t", "et"]
