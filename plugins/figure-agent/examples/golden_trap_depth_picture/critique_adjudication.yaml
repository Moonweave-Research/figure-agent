schema: figure-agent.critique_adjudication.v1
fixture: golden_trap_depth_picture
adjudicated_at: 2026-05-04T01:50:00Z
adjudicator: author
critique_run_id: v0.2_ungrounded_iter1to3
notes: >
  N=1 baseline adjudication of the v0.2 ungrounded /fig_critique loop
  (3 iterations, 11 findings). Single-rater (author). Uses the rubric defined
  in plugins/figure-agent/docs/critique-evaluation-rubric-v1.md. Severity
  weights: BLOCKER=4, MAJOR=2, MINOR=1, NIT=0.5.

findings_produced:
  - id: C001
    category: TP
    severity: MINOR
    note: >
      Removed bottom g(E_t) axis label. Initially appeared to drift from reference
      (reference had two labels) but author later confirmed the reference itself
      was wrong on this point. Final state: removed. Useful improvement.

  - id: C002
    category: FP
    severity: MINOR
    note: >
      Shortened "Debye exp(-t/τ)" to "(Debye)" inside Row 1 box. Reference has
      the full text intentionally as in-plot reading aid. Drift from author intent.

  - id: C003
    category: FP
    severity: NIT
    note: >
      Lifted Row 3 chemical/physical origin captions by +0.08cm. Original positions
      matched reference; the lift was unnecessary polish.

  - id: C004
    category: FP
    severity: NIT
    note: >
      Bumped shallow/deep label y-anchors to match lobe peaks. Original positions
      matched reference convention; bump did not improve readability.

  - id: C005
    category: FP
    severity: NIT
    note: >
      Extended Energy axis to span CB-VB visually. Reference uses a deliberately
      shorter axis floating in the band gap. Drifted from convention.

  - id: C006
    category: FP
    severity: MINOR
    note: >
      Removed the inline "(Debye)" annotation entirely (compounding C002).
      Reference has full annotation. Drift from author intent.

  - id: C007
    category: TP
    severity: MINOR
    note: >
      Re-routed Row 1 evidence arrow from 4-segment elbow (terminating in empty
      space) to 3-segment ending at brace top. Restores parallelism with Row 2/3
      arrows. Verified against reference.

  - id: C008
    category: TP
    severity: NIT
    note: >
      Moved "Discharge (Debye reference)" title from inside box to outside box
      top, matching Row 3 "localized traps" convention. Aligned with reference.

  - id: C009
    category: AMB
    severity: MINOR
    note: >
      Added evidence arrow from Σ=∫ icon to I(t)∝t^-n. Reference shows no such
      arrow. Whether reference's missing arrow is intentional gap (icon is
      identifier not transformation) or author oversight cannot be verified
      without authorial documentation. Default-classified AMB.

  - id: C010
    category: FP
    severity: MINOR
    note: >
      Added "(single τ)" clarifier next to τ_d. Reference has plain τ_d.
      Clarifier adds noise without improving comprehension.

  - id: C011
    category: FP
    severity: NIT
    note: >
      Added shallow ellipsis matching deep continuation indicator. Reference is
      deliberately asymmetric (only deep has continuation), encoding "deep traps
      extend further down toward VB". Symmetrizing erased that narrative.

findings_missed:
  - id: FN001
    severity: MAJOR
    description: >
      x-axis tick label overlap on Row 1 power-law plot and Debye reference plot
      (10^-3, 10^0, 10^3). L6 collision check reports 39 candidates per compile;
      critique did not surface any of them.
    note: >
      L6 produces report-only output. Critique brief did not include collision
      data; needs cross-feed.

  - id: FN002
    severity: BLOCKER
    description: >
      Row 3 polymer chains render as featureless wavy lines, not chemical
      structure. Reader cannot infer "S-rich polymer" from the rendering;
      conceptual claim of the figure is broken at the visual level.
    note: >
      This is the primary domain-knowledge gap. Critique did not have any
      semantic baseline against which to flag "this should be a chemical
      structure, not abstract waves".

  - id: FN003
    severity: MAJOR
    description: >
      "S-rich segments" dashed-box highlight on the polymer chains does not
      visually communicate what the highlight means. The S markers inside vs
      outside the highlighted region are not distinguishable in density.
    note: >
      Briefing prose says "S-rich segments" but does not specify visual
      semantic. Same root cause as FN002.

  - id: FN004
    severity: MINOR
    description: >
      Arrow overlap near right-panel band-gap area where row-exit arrows
      converge with band-diagram elements.
    note: >
      L6 collision detection partially captures; critique did not.

  - id: FN005
    severity: MINOR
    description: >
      Right-panel shallow/deep g(E_t) lobes have wrinkled/irregular shape due
      to poorly-chosen TikZ Bézier control points in the lobe-drawing macro.
    note: >
      L3 macro quality issue. Critique commented on label placement but not
      on lobe shape itself.

scoring:
  unweighted:
    TP: 3
    FP: 7
    AMB: 1
    FN: 5
    P: 0.286
    R: 0.375
    F1: 0.324
  severity_weighted:
    TP: 2.5
    FP: 5.0
    AMB: 1.0
    FN: 10.0
    P: 0.313
    R: 0.200
    F1: 0.244

gate_status:
  P_w_threshold: 0.6
  P_w_actual: 0.313
  P_w_pass: false
  R_w_threshold: 0.4
  R_w_actual: 0.200
  R_w_pass: false
  blocker_fn_count: 1
  blocker_fn_pass: false  # any BLOCKER FN is automatic fail
  overall: FAIL

baseline_use: >
  This adjudication is the v0.2 ungrounded baseline against which any v0.3
  intervention (cheap experiment or full L0 schema layer) must improve.
  Decision rule per docs/critique-evaluation-rubric-v1.md §6:
    - F1_w improvement ≥0.15 absolute → cheap intervention sufficient
    - F1_w improvement 0.05–0.15 → partial; v0.3 schema priority drops
    - F1_w improvement <0.05 → schema layer justified

  BLOCKER FN (FN002 polymer chains) is structural; no critique-layer
  intervention can fix it. Belongs to L1 briefing semantic grounding
  regardless of which path v0.3 takes.

---

# v0.3 GROUNDED EXPERIMENT — iter 4 (cheap intervention A+B)

grounded_experiment:
  critique_run_id: v0.3_grounded_cheap_experiment_iter4
  date: 2026-05-04
  adjudicated_at: 2026-05-04T10:15:00Z
  adjudicator: author
  interventions_applied:
    - briefing.md §7 Author Intent section (must_depict + must_avoid + semantic_assertions)
    - critique_brief.py: reference PNG attached to brief input
    - .tex changes: G002–G006 applied (5 light findings); G001 (polymer macro rewrite) deferred
  notes: >
    Grounded critique brief contains (a) build PNG, (b) reference PNG (golden_target_001.png),
    (c) briefing.md with §7 Author Intent clauses. All findings cite specific brief clauses
    or reference-comparison data. FN001–FN005 from v0.2 baseline are re-evaluated against
    this run's findings G001–G006.

  findings_grounded:
    - id: G001
      category: TP
      severity: BLOCKER
      grounded_in: "briefing §7 must_avoid 'Featureless waves with no monomer-level texture'"
      description: >
        Row 3 chains lack chemical structure (no zigzag backbone, no discrete monomers,
        S atoms rendered as tiny circles). Brief explicitly requires "monomer-level
        texture" and "sulfur atoms must be visually distinct".
      status: open (deferred to v0.3 L3 macro work)

    - id: G002
      category: TP
      severity: MAJOR
      grounded_in: "briefing §7 must_depict 'shallow lobe peak ≈2×–3× taller than deep'"
      description: >
        Lobe height ratio was ~1.2–1.5×. Fixed by Bézier control-point adjustment
        (line 178–183). Current PNG shows ~2.3–2.5× ratio (visual inspection confirms).
      status: applied (G002 changes in .tex)

    - id: G003
      category: TP
      severity: MAJOR
      grounded_in: "briefing §7 must_avoid 'Energy axis that doesn't span CB→VB range'"
      description: >
        Energy axis originally spanned y=1.15–4.42 (interior to CB/VB boxes). Fixed by
        extending to y=1.05–4.95 (line 158). Reference had short axis but brief overrides
        reference defect per author intent.
      status: applied (C005-equivalent fix)

    - id: G004
      category: TP
      severity: MAJOR
      grounded_in: "L6 collision report (39 candidates) + Style Lock readability"
      description: >
        x-axis tick labels crowded on both Row 1 plots. Reduced ticks from 3 (10^-3, 10^0, 10^3)
        to 2 (10^-3, 10^3). Visual clutter eliminated.
      status: applied (line 54–55, 80–81)

    - id: G005
      category: TP
      severity: MAJOR
      grounded_in: "briefing §7 must_avoid 'Floating arrows not anchored' + L6 collision"
      description: >
        Band-gap area had arrow/dashed-line/brace convergence at ~0.3 cm. Fixed by
        redirecting Row 3 exit arrow upward (line 147) and shortening E_t dashed line
        (line 162). Elements now visually separated.
      status: applied

    - id: G006
      category: TP
      severity: MINOR
      grounded_in: "briefing §7 must_depict 'S-rich segments visually distinct'"
      description: >
        S-rich highlight (dashed box at x=4.20–5.85) appeared to have uniform S density
        inside and outside. Added 3 extra S markers within highlight region (line 128–130).
        Visual density difference now apparent.
      status: applied

  findings_missed_grounded:
    - id: FN005
      severity: MINOR
      description: >
        Lobe shape remains slightly wrinkled/irregular (Bézier control-point quality).
        Brief specifies proportion (G002) but not smoothness. This is either (a) L7 Inkscape
        work or (b) macro-design issue (L3). Not caught by grounded critique because brief
        does not mention curve smoothness.
      grounded_status: not_in_scope

  scoring_grounded:
    unweighted:
      TP: 6
      FP: 0
      FN: 1
      P: 1.000
      R: 0.857
      F1: 0.923
    severity_weighted:
      TP: 12.5  # BLOCKER(4) + 4×MAJOR(2) + MINOR(0.5)
      FN: 0.5   # FN005 MINOR
      P: 1.000
      R: 0.962  # 12.5 / (12.5 + 0.5)
      F1: 0.981

  gate_status_grounded:
    baseline_F1_w: 0.244
    grounded_F1_w: 0.981
    improvement_absolute: 0.737
    improvement_threshold_sufficient: 0.150
    improvement_pass: true
    blocker_fn_grounded: 1  # G001 polymer chains still open, not applied
    notes: >
      Cheap intervention (briefing §7 + reference attached) exceeds §6 decision threshold
      by 4.9×. Five light findings (G002–G006) applied successfully, producing visible
      improvements in PNG. One BLOCKER (G001) remains open because polymer macro rewrite
      is heavyweight and deferred to v0.3 L3 work.

decision_outcome: >
  **v0.3 scope decision: CONFIRMED SCOPE REDUCTION.**
  The +0.74 F1_w improvement from cheap intervention A (briefing.md §7) + B (reference
  attached) exceeds the 0.15 threshold decisively. Recommendation: ship v0.3.0 with
  (1) briefing.md §7 Author Intent convention (plain prose, no new file type)
  (2) critique_brief.py reference image attachment (~5 lines code)
  Do NOT ship briefing_semantic.yaml schema layer for v0.3.0; defer to N≥2 fixture
  validation or when cheap intervention shows signs of plateauing.
