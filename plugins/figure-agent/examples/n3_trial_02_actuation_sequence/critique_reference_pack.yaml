reference_learning:
  schema: figure-agent.reference-learning.v1
  references:
    - path: reference/codex_gen_v1.png
      roles:
        - style_anchor
        - density_reference
        - composition_reference
        - journal_tone_reference
      allowed_transfer:
        - restrained scientific illustration tone
        - balanced ink density across the three actuation stages
        - compact label hierarchy
        - clear stage-to-stage visual rhythm
      forbidden_transfer:
        - copy component topology
        - introduce unbriefed hardware or materials
        - override the left-to-right actuation story
