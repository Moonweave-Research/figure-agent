selection_notes: |
  Round 2 (schematic intent, post-reset). Compared chatgpt_b01 vs nanobanana_b01.
  ChatGPT preferred for: clean Nature-style band diagram, accurate label placement
  (CB/LUMO + VB/HOMO unified — Nano Banana split LUMO and CB into separate
  redundant lines), correct trapped-electron positions (Nano Banana drew "trapped
  electrons" on CB level — physically wrong), elegant polarization-response glyph
  (dipole + ⊖→⊕ in dashed oval), distinct shallow-vs-deep trap visualization with
  precise capture/escape arrows. Nano Banana also had label noise ("cond band
  (CB)" duplication, "low-based dielectric" typo for "low-trap dielectric").
  Previous attempt (data figure) archived under previews/_previous_attempt_data_figure/.
