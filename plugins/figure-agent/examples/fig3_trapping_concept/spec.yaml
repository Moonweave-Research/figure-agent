name: fig3_trapping_concept

# Physics invariants (briefing §6) that are directional in the .tex:
#  - "Capture direction is CB to deep trap, not the reverse" → capArr points DOWN.
#  - Thermal escape (deep → shallow) → escArr points UP (opposite of capture).
tex_assertions:
  - id: capture-points-down-cb-to-deep-trap
    anchor_style: capArr
    axis: y
    direction: decreasing
  - id: escape-points-up-deep-to-shallow
    anchor_style: escArr
    axis: y
    direction: increasing

panels:
  - id: a
    caption: PDMS — clean bandgap (no trap states)
  - id: b
    caption: Sulfur Polymer — deep trap states in bandgap
style_profile: polymer-default
visual_clash_cap: 14
undeclared_geometry_profile: schematic
# Original preview (chatgpt_b01.png) not present in current previews/.
# selection_notes below preserves the historical decision record.
selected_preview: null
selection_notes: |
  Round 2 (schematic intent, post-reset). Compared chatgpt_b01 vs nanobanana_b01.
  ChatGPT preferred for: clean Nature-style band diagram, accurate label placement
  (CB/LUMO + VB/HOMO unified — Nano Banana split LUMO and CB into separate
  redundant lines), correct trapped-electron positions (Nano Banana drew "trapped
  electrons" on CB level — physically wrong), elegant polarization-response glyph
  (dipole + ⊖→⊕ in dashed oval), distinct shallow-vs-deep trap visualization with
  precise capture/escape arrows. Nano Banana also had label noise ("cond band
  (CB)" duplication, "low-based dielectric" typo for "low-trap dielectric").
  Previous attempt (data figure) archived under previews/_previous_attempt_data_figure/.
