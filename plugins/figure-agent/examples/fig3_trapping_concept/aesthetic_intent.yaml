schema: figure-agent.aesthetic-intent.v2
fixture: fig3_trapping_concept
target_journal: Nature Materials
visual_maturity: restrained
density: balanced
reference_style: mechanism_schematic
design_principles:
  - id: two_panel_contrast
    instruction: "Keep PDMS visually simpler than sulfur polymer so polarization-only and trap-retention mechanisms separate immediately."
  - id: discrete_trap_authority
    instruction: "Make shallow and deep trap levels read as discrete states rather than curves, clouds, or decorative gradients."
  - id: print_scale_respect
    instruction: "Keep CB, VB, E_t, kT, injection, capture, and escape labels legible at manuscript print scale."
must_avoid:
  - id: continuum_traps
    pattern: "Trap states rendered as smooth energy curves, density clouds, or free-floating decorative texture."
    severity: MAJOR
  - id: reversed_physics
    pattern: "Capture arrow pointing away from the deep trap or escape arrow visually dominating injection/capture."
    severity: MAJOR
  - id: generic_band_template
    pattern: "Both panels using identical icon grammar so PDMS and sulfur polymer no longer contrast mechanistically."
    severity: MAJOR
polish_triggers:
  - id: tikz_micro_polish
    condition: "The mechanism is correct but print-scale label spacing, stroke hierarchy, or trap-level clarity can improve in source."
    recommended_path: continue_tikz
  - id: svg_micro_polish
    condition: "TikZ/source semantics are locked and only optical stroke/spacing finish remains."
    recommended_path: ready_for_svg_polish
aesthetic_levers:
  - id: mechanism_contrast
    dimension: cross_panel_grammar
    intent: "Make panel a read as clean polarization response and panel b as deep-trap retention without adding data-figure complexity."
    priority: required
    positive_signals:
      - "panel a has fewer components and no trap-level line"
      - "panel b clearly shows shallow and deep trap levels"
      - "density difference supports the mechanism contrast"
    anti_patterns:
      - "panel a and panel b have the same visual density"
      - "trap levels look like decorative stripes"
      - "PDMS appears to contain trap states"
    allowed_adjustments:
      - "rebalance panel density"
      - "clarify trap-level labels"
      - "reduce non-semantic support strokes"
    forbidden_adjustments:
      - "add trap levels to PDMS"
      - "remove sulfur polymer trap levels"
      - "change the two-panel contrast story"
    default_route: tikz_patch
  - id: trap_level_legibility
    dimension: component_fidelity
    intent: "Keep trapped electrons anchored to trap levels and visually separate mobile electrons from trapped electrons."
    priority: required
    positive_signals:
      - "deep-trap electron cluster sits on or immediately above the deep trap level"
      - "shallow and deep trap labels are distinguishable"
      - "thermal escape is visibly weaker than injection/capture"
    anti_patterns:
      - "floating trapped electrons in the bandgap"
      - "equal-sized injection and escape arrows"
      - "unlabeled or merged trap levels"
    allowed_adjustments:
      - "micro-position trapped-electron dots"
      - "thin weak escape arrows"
      - "add local label breathing room"
    forbidden_adjustments:
      - "reverse capture direction"
      - "make escape dominant"
      - "rename physical quantities"
    default_route: tikz_patch
  - id: restrained_publication_finish
    dimension: maturity
    intent: "Keep the figure clean and manuscript-grade without turning the schematic into a decorative cover graphic."
    priority: recommended
    positive_signals:
      - "limited semantic color palette"
      - "controlled label hierarchy"
      - "white or light-gray schematic background remains quiet"
    anti_patterns:
      - "poster-like gradients"
      - "oversized decorative arrows"
      - "color accents not tied to physical meaning"
    allowed_adjustments:
      - "rebalance blue/red/amber emphasis"
      - "tighten label spacing"
      - "normalize stroke rhythm"
    forbidden_adjustments:
      - "add non-semantic colors"
      - "hide required labels"
      - "change mechanism meaning"
    default_route: tikz_patch
