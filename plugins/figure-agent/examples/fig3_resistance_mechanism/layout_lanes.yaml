schema: figure-agent.layout-lanes.v1
exclude_path_regex: '(?:^|/)execution-repair-v(?:[1-9]|[1-5][0-9]|6[0-3])/'
label_groups:
  - id: breadth_descriptor
    required_phrase: distribution breadth
  - id: energy_axis_label
    required_phrase: trap energy E
rules:
  - id: breadth_clear_of_energy_axis
    kind: minimum_clearance
    first: breadth_descriptor
    second: energy_axis_label
    minimum_normalized_clearance: 0.01
