schema: figure-agent.layout-lanes.v1
exclude_path_regex: '(?:^|/)execution-repair-v[0-9]+/'
label_groups:
  - id: response_qualifier
    required_phrase: qualitative CvS decay
  - id: response_equation
    required_phrase: I(t)
  - id: energy_axis_label
    required_phrase: energy, E
rules:
  - id: response_qualifier_clear_of_response_curve_label
    kind: minimum_clearance_from_groups
    group: response_qualifier
    other_groups:
      - response_equation
    minimum_normalized_clearance: 0.008
