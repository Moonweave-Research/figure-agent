schema: figure-agent.benchmark-contract.v1
fixture: smoke_label_overlap_demo
defect_class: label_overlap
candidate_families:
  - label-repair
candidate_edit_classes:
  - label_offset
required_detectors:
  - text_boundary
detector_reports:
  text_boundary: benchmark_reports/text_boundary.json
expected_movement:
