name: fig1_overview_v2_pair_001_vault
paper_id: pair001
title: "Fig 1 — Charge trapping in sulfur-rich polymer (pair_001 vault arm)"
reference_image: reference/current_render_baseline_2026-07-03.png

# Physics invariant (briefing §8.5): Column F cantilever bends LEFT, away from the
# electrode = the Coulomb-repulsion signature. The F-7 Coulomb arrow is inline-styled
# (no named style) so it is anchored by `near` its tail; it must point in -x.
tex_assertions:
  - id: panelF-coulomb-repulsion-points-away-from-electrode
    near: [11.55, 1.3]
    axis: x
    direction: decreasing
panels:
  - id: A
    caption: poly(S-r-DIB) primary microstructure
    bbox_pdf_cm: [0.141, 0.141, 4.591, 5.227]
    # No positive reference yet; sulfur_polymer_panelA_ref.png is an
    # anti-reference (network topology forbidden). See reference/audit_table.md.
  - id: B
    caption: Sulfur composition variation — 3 representative chains (S60/S75/S85) of paper's 5-sample range (S60/S70/S75/S80/S85)
    bbox_pdf_cm: [4.655, 0.141, 8.850, 5.227]
    # Concept-figure scaffold (post-iter1 2026-05-17 restructure 4→3). Full
    # 5-sample dataset belongs to Fig 2~ quantitative panels. See
    # reference/audit_table.md.
  - id: C
    caption: Localized traps (HERO #1) — real-space + energy diagram split
    bbox_pdf_cm: [8.914, 0.141, 17.878, 5.227]
    # No reference; figure-research recommended (highest-priority gap).
  - id: D
    caption: Column D — Kinetic evidence (SMU+MIM apparatus + I(t)~t^-n result)
    bbox_pdf_cm: [0.205, 5.926, 5.883, 11.070]
    reference_image: reference/row2_apparatus/apparatus1_ref04_NatComm2022_tribo_p3-03.png
    # PRIMARY: Wang NatComm 2022 Fig 1 (HANDOFF-adopted). 3-axis audit: theoretical
    # PARTIAL (triboelectric not CvS), structural PASS, storyline PARTIAL.
    # Transfer: equivalent-circuit symbols, side-by-side condition compare,
    # polymer-stack cross-section. Do-not-transfer: triboelectric mechanism,
    # breakdown narrative. Full audit: reference/audit_table.md.
  - id: E
    caption: Column E — ISPD-paired evidence (corona+probe apparatus + V_s decay + g(E_t) derived)
    bbox_pdf_cm: [6.074, 5.926, 12.008, 11.070]
    reference_image: reference/row2_apparatus/apparatus2_ref01_NatComm2024_surfacecharge_p2-02.png
    # PRIMARY (iter 15 reverted to He NatComm 2024, 2026-05-18): paper-grounded
    # side-view apparatus. Reverted from codex_style_03 (isometric) after user
    # direction "원래 대로 측면에서 본 그림이 나을거 같다" — side-view
    # structurally better for this apparatus. 3-axis audit: theoretical PASS,
    # structural PASS, storyline PASS. Transfer: probe-above-sample geometry,
    # motion-stage labeling, sample-on-grounded-substrate cross-section,
    # concept-apparatus-result row layout. Do-not-transfer: photo-aesthetic
    # mixing (Fig 1b), TENG-specific labels.
    #
    # SECONDARY (style benchmark, retained for detail-tier reference):
    #   reference/panel_E_topref/style_variations/codex_style_03_14h35.png
    # Codex imagegen ref03 — isometric paradigm. Used iter 9-14 as visual
    # benchmark for detail quality (cylinder shaft, metallic disk, V_s meter
    # inset screen, etc.) — those details preserved in iter 15 side-view.
    # Style mismatch (isometric vs side-view) means not suitable as PRIMARY.
  - id: F
    caption: Column F — Mechanical evidence (PSU+fixture apparatus + Maxwell baseline + Coulomb result)
    bbox_pdf_cm: [12.199, 5.926, 17.878, 11.070]
    reference_image: reference/row2_apparatus/apparatus3_ref01_NatComm2016_microactuator-2.png
    # PRIMARY: Conrad NatComm 2016 Fig 1 (HANDOFF-adopted, structural anchor).
    # 3-axis audit: theoretical PARTIAL (MEMS not polymer), structural PASS,
    # storyline PARTIAL. Transfer: cross-section line convention (electrode
    # hatching 45°+135° + insulator stipple); parameter labels (d, L, U);
    # deflection arrow notation. Do-not-transfer: MEMS-scale labels,
    # no-external-source convention. Secondary candidate (Wang NatComm 2024
    # dropletelectret) deferred until F's Maxwell-stress visualization needs
    # reinforcement (v8.8+).
style_profile: polymer-paper
