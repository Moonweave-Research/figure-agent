  as grammar/style anchors (metadata only — source paths masked). Same
  design.md snapshot SHA as no_vault arm
  (fa7a6d9ff7890a440ca3471995acf8145c47001a996dbd8bf2c428b363d8f7b7).
  degraded_mode=true preserved because chroma_v2 indexes still absent.

