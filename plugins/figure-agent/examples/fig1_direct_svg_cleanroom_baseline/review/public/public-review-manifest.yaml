semantic_review_context:
  scientific_objects:
    panel_c:
    - id: c_polymer_film
      kind: poly(S-r-DIB) thin film
      properties:
        morphology: fully amorphous
        thickness_scale: approximately 1 micrometre
    - id: c_shallow_trap_population
      kind: continuous shallow-trap distribution
      properties:
        release: thermally easier
        lifetime: shorter
    - id: c_deep_trap_population
      kind: continuous deep-trap distribution
      properties:
        release: thermally harder
        lifetime: longer
    - id: c_mobility_edge
      kind: mobility edge
    - id: c_conduction_band
      kind: conduction-band reference
    - id: c_valence_band
      kind: valence-band reference
    - id: c_trap_depth
      kind: symbolic deep-trap depth
    panel_f:
    - id: f_polymer_cantilever
      kind: poly(S-r-DIB) cantilever
    - id: f_fixed_support
      kind: cantilever clamp
    - id: f_planar_electrode
      kind: biased planar electrode
    - id: f_active_bias
      kind: applied electrical bias
    - id: f_trapped_charge
      kind: trapped surface charge population
    - id: f_coulomb_repulsion
      kind: electrostatic repulsive force
    - id: f_air_gap
      kind: cantilever-electrode clearance
  object_relations:
  - subject: c_shallow_trap_population
    predicate: coexists_with
    object: c_deep_trap_population
    qualification: spatially mixed within the same polymer matrix
  - subject: c_shallow_trap_population
    predicate: lies_below
    object: c_mobility_edge
    qualification: closer to the mobility edge than the deep population
  - subject: c_deep_trap_population
    predicate: lies_below
    object: c_mobility_edge
    qualification: farther below the mobility edge than the shallow population
  - subject: c_shallow_trap_population
    predicate: represented_as
    object: continuous Gaussian density of states
  - subject: c_deep_trap_population
    predicate: represented_as
    object: continuous Gaussian density of states
  - subject: c_trap_depth
    predicate: measures_symbolically
    object: c_deep_trap_population
    qualification: no numeric value or energy unit
  - subject: f_active_bias
    predicate: energizes
    object: f_planar_electrode
  - subject: f_trapped_charge
    predicate: accumulates_on
    object: f_polymer_cantilever
  - subject: f_coulomb_repulsion
    predicate: acts_on
    object: f_polymer_cantilever
    qualification: drives the cantilever away from the electrode
  - subject: f_polymer_cantilever
    predicate: manifests_macroscopically
    object: c_deep_trap_population
    qualification: mechanical evidence for the same trap landscape
  text_content:
    panel_c:
    - C
    - localized traps
    - poly(S-r-DIB) thin film
    - "d \u2248 1 \u03BCm"
    - Energy
    - E_C
    - mobility edge
    - E_V
    - shallow
    - deep
    - "\u0394E_t^d"
    panel_f:
    - F
    - mechanical
    - V_active
    - q_tr
    - Coulomb
    - repulsion
    - electrode
    - air gap
