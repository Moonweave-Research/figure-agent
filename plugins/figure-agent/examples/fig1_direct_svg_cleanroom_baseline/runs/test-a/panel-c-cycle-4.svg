<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1080 680">
  <defs>
    <linearGradient id="film-fill" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#f7f2df"/>
      <stop offset="1" stop-color="#e7ddbc"/>
    </linearGradient>
    <radialGradient id="blue-trap" cx="35%" cy="30%" r="68%">
      <stop offset="0" stop-color="#dbeaff"/>
      <stop offset="0.35" stop-color="#547ca8"/>
      <stop offset="1" stop-color="#123f69"/>
    </radialGradient>
    <radialGradient id="red-trap" cx="35%" cy="30%" r="68%">
