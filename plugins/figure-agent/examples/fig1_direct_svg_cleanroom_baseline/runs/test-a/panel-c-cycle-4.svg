    <text x="794" y="174" font-family="Latin Modern Sans, sans-serif" font-size="31" font-style="italic">E<tspan font-size="20" baseline-shift="sub">C</tspan></text>
  </g>
  <g id="c_mobility_edge" stroke="#292929" fill="#292929">
