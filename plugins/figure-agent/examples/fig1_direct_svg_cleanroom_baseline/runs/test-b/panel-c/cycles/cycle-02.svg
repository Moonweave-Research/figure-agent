<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 640" role="img" aria-labelledby="title desc">
  <title id="title">Panel C: localized shallow and deep traps in an amorphous polymer</title>
  <desc id="desc">Mixed shallow and deep traps in a polymer film correspond to continuous energy distributions below a mobility edge.</desc>
  <defs>
    <linearGradient id="film-fill" x1="0" y1="0" x2="1" y2="1"><stop offset="0" stop-color="#fbfdfe"/><stop offset="1" stop-color="#e6edf1"/></linearGradient>
    <linearGradient id="shallow-fill" x1="0" y1="0" x2="1" y2="0"><stop offset="0" stop-color="#1688c7" stop-opacity="0.08"/><stop offset="1" stop-color="#1688c7" stop-opacity="0.5"/></linearGradient>
    <linearGradient id="deep-fill" x1="0" y1="0" x2="1" y2="0"><stop offset="0" stop-color="#df3c42" stop-opacity="0.08"/><stop offset="1" stop-color="#df3c42" stop-opacity="0.5"/></linearGradient>
  </defs>
  <rect width="960" height="640" fill="#fff"/>
  <g fill="#17212b" font-family="Latin Modern Sans, sans-serif"><text x="34" y="56" font-size="38" font-weight="700">C</text><text x="92" y="54" font-size="25" font-weight="700">localized traps</text></g>
  <g id="c_polymer_film" data-semantic="true">
    <rect x="70" y="135" width="372" height="372" rx="30" fill="url(#film-fill)" stroke="#81909a" stroke-width="2"/>
    <g fill="none" stroke="#bcc7ce" stroke-width="4" opacity="0.78"><path d="M101 190 C150 154 187 212 230 178 S308 177 345 210 S392 201 416 173"/><path d="M93 279 C139 244 176 303 220 270 S301 264 346 297 S392 289 421 255"/><path d="M105 375 C145 337 189 397 230 362 S308 355 352 391 S393 380 416 349"/><path d="M94 456 C135 423 179 471 220 443 S298 431 342 461 S391 453 419 425"/></g>
    <text x="256" y="548" text-anchor="middle" fill="#17212b" font-family="Latin Modern Sans, sans-serif" font-size="22">poly(S-r-DIB) thin film</text><text x="256" y="578" text-anchor="middle" fill="#53616b" font-family="Latin Modern Sans, sans-serif" font-size="19">d ≈ 1 μm</text>
  </g>
  <g id="c_shallow_trap_population" data-semantic="true" fill="#1688c7" stroke="#fff" stroke-width="2">
    <circle cx="134" cy="226" r="10"/><circle cx="236" cy="214" r="10"/><circle cx="365" cy="240" r="10"/><circle cx="182" cy="328" r="10"/><circle cx="306" cy="312" r="10"/><circle cx="392" cy="350" r="10"/><circle cx="126" cy="420" r="10"/><circle cx="270" cy="448" r="10"/>
    <g fill="none" stroke="#1688c7" stroke-width="3"><path d="M134 212 V180 M126 190 L134 180 L142 190"/><path d="M306 298 V266 M298 276 L306 266 L314 276"/></g>
  </g>
  <g id="c_deep_trap_population" data-semantic="true" fill="#df3c42" stroke="#fff" stroke-width="2">
    <circle cx="182" cy="248" r="11"/><circle cx="294" cy="242" r="11"/><circle cx="404" cy="204" r="11"/><circle cx="118" cy="344" r="11"/><circle cx="250" cy="350" r="11"/><circle cx="350" cy="382" r="11"/><circle cx="202" cy="438" r="11"/><circle cx="378" cy="454" r="11"/>
    <path d="M250 334 V288 M242 298 L250 288 L258 298" fill="none" stroke="#df3c42" stroke-width="3" stroke-dasharray="5 5"/>
  </g>
  <g fill="none" stroke="#17212b"><path d="M548 550 V146 M540 158 L548 146 L556 158" stroke-width="2.5"/><path d="M548 550 H884" stroke-width="2.5"/><text x="504" y="336" transform="rotate(-90 504 336)" fill="#17212b" stroke="none" font-family="Latin Modern Sans, sans-serif" font-size="21">Energy</text><text x="716" y="587" text-anchor="middle" fill="#53616b" stroke="none" font-family="Latin Modern Sans, sans-serif" font-size="17">density of localized states</text></g>
  <g id="c_conduction_band" data-semantic="true"><path d="M548 168 H884" stroke="#17212b" stroke-width="3"/><path d="M548 156 H884" stroke="#17212b" stroke-width="2" opacity="0.35"/><text x="900" y="174" fill="#17212b" font-family="Latin Modern Sans, sans-serif" font-size="20">E_C</text></g>
  <g id="c_mobility_edge" data-semantic="true"><path d="M548 228 H884" stroke="#596873" stroke-width="2.5" stroke-dasharray="10 7"/><text x="874" y="216" text-anchor="end" fill="#596873" font-family="Latin Modern Sans, sans-serif" font-size="18">mobility edge</text></g>
  <g><path d="M548 228 C590 228 610 238 634 258 C660 280 686 293 738 298 C686 303 660 316 634 338 C610 358 590 368 548 368 Z" fill="url(#shallow-fill)" stroke="#1688c7" stroke-width="3"/><text x="750" y="304" fill="#1688c7" font-family="Latin Modern Sans, sans-serif" font-size="20" font-weight="700">shallow</text></g>
  <g><path d="M548 352 C588 352 612 362 640 382 C674 407 705 420 767 424 C705 428 674 441 640 466 C612 486 588 496 548 496 Z" fill="url(#deep-fill)" stroke="#df3c42" stroke-width="3"/><text x="779" y="430" fill="#df3c42" font-family="Latin Modern Sans, sans-serif" font-size="20" font-weight="700">deep</text></g>
  <g id="c_valence_band" data-semantic="true"><path d="M548 550 H884" stroke="#17212b" stroke-width="3"/><text x="900" y="557" fill="#17212b" font-family="Latin Modern Sans, sans-serif" font-size="20">E_V</text></g>
  <g id="c_trap_depth" data-semantic="true" stroke="#df3c42" fill="none"><path d="M829 228 H851 M840 228 V424 M829 424 H851" stroke-width="2.5"/><text x="856" y="334" fill="#df3c42" stroke="none" font-family="Latin Modern Sans, sans-serif" font-size="20">ΔE_t^d</text></g>
  <g id="relation-c-01" data-coverage="declared-not-spatially-verified" data-relation-subject="c_shallow_trap_population" data-relation-predicate="coexists_with" data-relation-object="c_deep_trap_population" data-qualification="spatially mixed within the same polymer matrix"/>
  <g id="relation-c-02" data-coverage="declared-not-spatially-verified" data-relation-subject="c_shallow_trap_population" data-relation-predicate="lies_below" data-relation-object="c_mobility_edge" data-qualification="closer to the mobility edge than the deep population"/>
  <g id="relation-c-03" data-coverage="declared-not-spatially-verified" data-relation-subject="c_deep_trap_population" data-relation-predicate="lies_below" data-relation-object="c_mobility_edge" data-qualification="farther below the mobility edge than the shallow population"/>
  <g id="relation-c-04" data-coverage="declared-not-spatially-verified" data-relation-subject="c_shallow_trap_population" data-relation-predicate="represented_as" data-relation-object="continuous Gaussian density of states"/>
  <g id="relation-c-05" data-coverage="declared-not-spatially-verified" data-relation-subject="c_deep_trap_population" data-relation-predicate="represented_as" data-relation-object="continuous Gaussian density of states"/>
  <g id="relation-c-06" data-coverage="declared-not-spatially-verified" data-relation-subject="c_trap_depth" data-relation-predicate="measures_symbolically" data-relation-object="c_deep_trap_population" data-qualification="no numeric value or energy unit"/>
</svg>
