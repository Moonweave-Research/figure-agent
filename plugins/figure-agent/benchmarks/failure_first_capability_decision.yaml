cross_family_findings:
  semantic_or_relation_regression_policy: A visual reduction never compensates for a semantic or relation failure.
  transferred_capabilities: []
  non_transfer_reason: Fig1 lacks transcript-bound comparable runs and named human outcomes; Fig3 has comparable runs but both assisted outputs were human-rejected.
  correction_minutes: unavailable_in_both_families_do_not_estimate_retrospectively
capabilities:
  - id: failure_first_comparison_contract
    classification: retain_experimental
    evidence: Fig3 comparable-v2 is transcript-bound and equal-input, but Fig1 is staged-only.
  - id: declared_semantic_relation_guard
    classification: retain_experimental
    evidence: Fig1 demonstrates one exact semantic repair; independent two-family transcript-bound and human-accepted replication is absent.
  - id: layout_and_collision_guard
    classification: retain_experimental
    evidence: Fig3 reduces geometry defects and occurrences, while its verified and repaired renders remain human-rejected.
  - id: provenance_and_clean_reproduction
    classification: retain_experimental
    evidence: Fig3 is reproducible with bound receipts; Fig1 does not yet meet the same evidence standard.
  - id: human_scaffold_verdict
    classification: human_only
    evidence: Both the Fig3 rejections and later development-baseline review are named human judgments; no machine gate substitutes for them.
  - id: direct_svg_primary_authoring
    classification: retire
    evidence: The reviewed Fig1 direct-SVG baseline contains confirmed geometry, typography, finish, and style defects; SVG remains diagnostic/interchange only.
product_rule_change: not_authorized
publication_acceptance: not_claimed
next_evidence_required:
  - Run a Fig1 equal-input, transcript-bound raw/verified/repaired comparison with a named human verdict for every condition.
  - Record prospective correction minutes during a real bounded repair.
  - Require human acceptance in both families before any capability is promoted.
