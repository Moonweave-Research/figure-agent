name: figure-agent tests

on:
  push:
  pull_request:
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: plugins/figure-agent
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v4

      - name: Set up Python
        run: uv python install 3.12

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            dvisvgm \
            imagemagick \
            librsvg2-bin \
            poppler-utils \
            qpdf \
            tesseract-ocr \
            texlive-fonts-extra \
            texlive-latex-extra \
            texlive-luatex \
            texlive-pictures

      - name: Install dependencies
        run: uv sync --group dev

      - name: Lint
        run: uv run ruff check .

      - name: Run tests
        run: uv run pytest -q
