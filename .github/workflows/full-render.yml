name: figure-agent full render tests

on:
  push:
    branches:
      - main
  pull_request:
    types: [opened, synchronize, reopened, labeled]
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.head.ref || github.ref_name }}
  cancel-in-progress: true

jobs:
  full-render:
    if: >-
      github.event_name != 'pull_request' ||
      contains(github.event.pull_request.labels.*.name, 'full-render')
    runs-on: ubuntu-latest
    timeout-minutes: 20
    defaults:
      run:
        working-directory: plugins/figure-agent
    steps:
      - uses: actions/checkout@v5

      - name: Install uv
        uses: astral-sh/setup-uv@v8.1.0
        with:
          cache-suffix: full-render

      - name: Set up Python
        run: uv python install 3.12

      - name: Install system dependencies
        timeout-minutes: 12
        run: |
          sudo apt-get update
          # Pre-accept the Microsoft Core Fonts EULA so the installer is non-interactive.
          # Required for polymer-paper-preamble.sty's `\setmainfont{Arial}` lookup.
          echo "ttf-mscorefonts-installer msttcorefonts/accepted-mscorefonts-eula select true" \
            | sudo debconf-set-selections
          sudo DEBIAN_FRONTEND=noninteractive apt-get install -y \
            dvisvgm \
            imagemagick \
            librsvg2-bin \
            poppler-utils \
            qpdf \
            tesseract-ocr \
            texlive-fonts-extra \
            texlive-latex-extra \
            texlive-luatex \
            texlive-pictures \
            ttf-mscorefonts-installer
          # Refresh the font cache so fontspec/lualatex can find Arial by name.
          sudo fc-cache -f

      - name: Install dependencies
        run: uv sync --group dev

      - name: Lint
        run: uv run ruff check .

      - name: Compile fixtures and check visual clash budgets
        timeout-minutes: 12
        run: |
          for spec in examples/*/spec.yaml; do
            fixture="$(dirname "$spec")"
            name="$(basename "$fixture")"
            tex="$fixture/$name.tex"
            if [[ -f "$tex" ]]; then
              bash scripts/compile.sh "$tex"
            fi
          done
          uv run python3 scripts/checks/check_visual_clash_budget.py examples

      - name: Pre-build smoke export (required by stage-assertion test)
        run: |
          uv run python3 scripts/run_export.py smoke_trap_demo

      - name: Run tests
        run: uv run pytest -q
